<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الذكاء الخارق</title>
    <style>
        /* تنسيق الصفحة */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        .card {
            background: #16213e;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            border: 2px solid #0f3460;
            width: 350px;
            position: relative;
        }

        h2 {
            margin-bottom: 30px;
            font-size: 28px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            transition: 0.3s;
        }

        #yesBtn {
            background-color: #4e9f3d;
            color: white;
        }

        #yesBtn:hover {
            background-color: #191a19;
            border: 1px solid #4e9f3d;
        }

        #noBtn {
            background-color: #e94560;
            color: white;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="question">هل الدكتور هيديني بونص ؟</h2>
        <div class="btn-container">
            <button id="yesBtn">نعم</button>
            <button id="noBtn">لا</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');

        // عند الضغط على "لا" - الفخ
        noBtn.addEventListener('click', () => {
            alert("لقد ضغطت 'لا'.. هل تظن أنك تخدعنا؟ أنت غبي فعلاً! ");
            question.innerText = "تم إثبات الغباء بنجاح! 🧠🚫";
            noBtn.style.display = 'none';
        });

        // حركة إضافية: جعل زر "لا" يهرب أحياناً قبل الضغط عليه
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            // تحويل الزر لمكان مطلق في الصفحة ليهرب
            noBtn.style.position = 'absolute';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        });

        // عند الضغط على "نعم"
        yesBtn.addEventListener('click', () => {
            question.innerText = "";
            noBtn.style.display = 'none';
            yesBtn.innerHTML = "شكرا ي دكتور";
        });
    </script>

</body>
</html>
